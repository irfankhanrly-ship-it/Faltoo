name: Build GP2040-CE Kazuya Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout our repo
        uses: actions/checkout@v4
        with:
          path: mods

      - name: Install ARM toolchain and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build python3 python3-pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clone GP2040-CE v0.7.12
        run: |
          git clone --depth 1 --branch v0.7.12 --recurse-submodules https://github.com/OpenStickCommunity/GP2040-CE.git gp2040

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
          cd $HOME/pico-sdk && git submodule update --init

      - name: Copy custom DCN addon files
        run: |
          mkdir -p gp2040/headers/addons
          mkdir -p gp2040/src/addons
          cp mods/dcn.h  gp2040/headers/addons/dcn.h
          cp mods/dcn.cpp gp2040/src/addons/dcn.cpp

      - name: Patch addon manager to register DCN
        run: |
          cd gp2040
          # Add include and load line (append near other addons)
          sed -i '/#include "addons\/input_macro.h"/a #include "addons\/dcn.h"' src/addonmanager.cpp || true
          sed -i '/addons.LoadAddon(new InputMacro/a\    addons.LoadAddon(new DCNAddon(), CORE0_INPUT);' src/addonmanager.cpp || true

      - name: Patch CMakeLists to compile DCN
        run: |
          cd gp2040
          sed -i 's|src/addons/input_macro.cpp|src/addons/input_macro.cpp\n    src/addons/dcn.cpp|' CMakeLists.txt || true

      - name: Bump macro limit to 10
        run: |
          cd gp2040
          sed -i 's/#define MAX_MACRO_LIMIT 6/#define MAX_MACRO_LIMIT 10/' headers/addons/input_macro.h || true

      - name: Build web-config
        run: |
          cd gp2040/www
          npm install --legacy-peer-deps
          npm run build

      - name: Build firmware for Pi Pico 2 (RP2350)
        env:
          PICO_SDK_PATH: /home/runner/pico-sdk
          SKIP_WEBBUILD: "true"
        run: |
          cd gp2040
          mkdir build && cd build
          cmake .. -G Ninja \
            -DGP2040_BOARDCONFIG=Pico2 \
            -DPICO_BOARD=pico2 \
            -DPICO_PLATFORM=rp2350-arm-s \
            -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: GP2040-CE_Kazuya_Pico2
          path: gp2040/build/*.uf2
